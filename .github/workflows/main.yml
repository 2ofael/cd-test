name: CI/CD React Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ⚠️ Always latest Node (not recommended for production stability, but works)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Resolve deployment host
        id: deploy_host
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ -z "$EC2_USER" ] || [ -z "$EC2_SSH_KEY" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deployment skipped: required SSH secrets are not configured." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          host="${EC2_HOST#http://}"
          host="${host#https://}"
          host="${host%%/*}"
          if [[ "$host" == \[*\] ]]; then
            host="${host#[}"
            host="${host%%]*}"
          elif [[ "$host" == *:* ]]; then
            host="${host%%:*}"
          fi

          if [ -z "$host" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deployment skipped: EC2_HOST is not configured." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if ! HOST_TO_RESOLVE="$host" python3 -c 'import os, socket; socket.getaddrinfo(os.environ["HOST_TO_RESOLVE"], None)' >/dev/null 2>&1; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deployment skipped: EC2_HOST is not DNS-resolvable from the runner." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "host=$host" >> "$GITHUB_OUTPUT"

      - name: Deploy to EC2
        if: steps.deploy_host.outputs.ready == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.deploy_host.outputs.host }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/*"
          target: "/var/www/react-app"
