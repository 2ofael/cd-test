name: CI/CD React Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ⚠️ Always latest Node (not recommended for production stability, but works)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Resolve deployment host
        id: deploy_host
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ -z "$EC2_HOST" ] || [ -z "$EC2_USER" ] || [ -z "$EC2_SSH_KEY" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deployment skipped: required EC2 secrets are not configured." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          host="${EC2_HOST#http://}"
          host="${host#https://}"
          host="${host%%/*}"
          if [[ "$host" == \[*\] ]]; then
            host="${host#[}"
            host="${host%%\]*}"
          elif [[ "$host" == *:* ]]; then
            # Strip :port from hostname/IPv4, but keep raw IPv6 literals.
            colon_count="${host//[^:]}"
            colon_count="${#colon_count}"
            if [ "$colon_count" -eq 1 ]; then
              host="${host%%:*}"
            fi
          fi

          if [ -z "$host" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deployment skipped: EC2_HOST could not be parsed after normalization." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if ! getent ahosts "$host" >/dev/null 2>&1; then
            if nslookup "$host" >/dev/null 2>&1; then
              echo "Deployment host DNS resolution used nslookup fallback." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "ready=false" >> "$GITHUB_OUTPUT"
              echo "Deployment skipped: EC2_HOST is not DNS-resolvable from the runner." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "host=$host" >> "$GITHUB_OUTPUT"

      - name: Deploy to EC2
        if: steps.deploy_host.outputs.ready == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.deploy_host.outputs.host }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/*"
          target: "/var/www/react-app"
